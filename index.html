<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Testing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --yellow: #ffcc00; --green: #00ff88; --red: #ff2244; --orange: #ff6600; --cyan: #00cfff; --bg: #0a0a0a; --panel: #111; --border: #222; }
  body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.3rem; letter-spacing: 0.08em; color: var(--yellow); text-transform: uppercase; }
  #ready-dot { font-size: 0.6rem; color: var(--green); letter-spacing: 0.1em; }
  #cam-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  canvas#overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  canvas#proc { display: none; }
  #controls { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
  .ctrl-btn { background: rgba(0,0,0,0.75); border: 1px solid #333; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.1em; padding: 8px 12px; border-radius: 3px; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
  .ctrl-btn.active { border-color: var(--green); color: var(--green); }
  #lock-btn { border-color: var(--yellow); color: var(--yellow); }
  #lock-btn.locked { border-color: var(--green); color: var(--green); }
  #start-msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); z-index: 20; gap: 14px; text-align: center; padding: 24px; }
  #start-msg h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; color: var(--yellow); }
  #start-msg p { font-size: 0.75rem; color: #888; max-width: 260px; line-height: 1.7; }
  #start-btn { background: var(--yellow); color: #000; border: none; padding: 14px 32px; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 3px; cursor: pointer; margin-top: 4px; }
  #tip { font-size: 0.65rem; color: #444; margin-top: -4px; }
  #status-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 0.62rem; color: #aaa; background: rgba(0,0,0,0.65); padding: 4px 12px; border-radius: 20px; z-index: 5; pointer-events: none; letter-spacing: 0.08em; white-space: nowrap; }
  #stats { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; }
  .stat-block { background: #0d0d0d; border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; }
  .stat-label { font-size: 0.6rem; color: #555; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; }
  .stat-value { font-size: 1.2rem; font-weight: bold; font-family: 'Barlow Condensed', sans-serif; }
  .stat-ratio { font-size: 0.75rem; color: #888; }
  .bar-wrap { background: #1a1a1a; border-radius: 2px; height: 4px; margin-top: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.15s ease; }
  .grade-block { grid-column: 1 / -1; background: #0d0d0d; border: 1px solid var(--border); border-radius: 4px; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
  .grade-label { font-size: 0.6rem; color: #555; letter-spacing: 0.15em; text-transform: uppercase; }
  .grade-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem; letter-spacing: 0.05em; }
  .grade-desc { font-size: 0.7rem; text-align: right; color: #888; }
</style>
</head>
<body>
<header>
  <h1>⬛ Centering Cam</h1>
  <span id="ready-dot">● READY</span>
</header>
<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="proc"></canvas>
  <div id="controls">
    <button class="ctrl-btn active" id="auto-btn">⟳ AUTO</button>
    <button class="ctrl-btn" id="lock-btn">⬛ LOCK</button>
  </div>
  <div id="status-bar">Searching — place card on dark surface</div>
  <div id="start-msg">
    <h2>Centering Cam</h2>
    <p>Point your camera at a Pokémon card on a dark surface. Edges are detected automatically.</p>
    <button id="start-btn">Start Camera</button>
    <div id="tip">Best results on a black or dark background</div>
  </div>
</div>
<div id="stats">
  <div class="stat-block">
    <div class="stat-label">◀ Left / Right ▶</div>
    <div class="stat-row">
      <span class="stat-value" id="lr-val" style="color:var(--orange)">—</span>
      <span class="stat-ratio" id="lr-ratio">—</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="lr-bar" style="background:var(--orange);width:50%"></div></div>
  </div>
  <div class="stat-block">
    <div class="stat-label">▲ Top / Bottom ▼</div>
    <div class="stat-row">
      <span class="stat-value" id="tb-val" style="color:var(--cyan)">—</span>
      <span class="stat-ratio" id="tb-ratio">—</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="tb-bar" style="background:var(--cyan);width:50%"></div></div>
  </div>
  <div class="grade-block">
    <div>
      <div class="grade-label">Est. PSA Grade</div>
      <div class="grade-value" id="grade-val">—</div>
    </div>
    <div class="grade-desc" id="grade-desc">Point camera<br>at card</div>
  </div>
</div><script>
const video     = document.getElementById('video');
const overlay   = document.getElementById('overlay');
const proc      = document.getElementById('proc');
const ctx       = overlay.getContext('2d');
const pctx      = proc.getContext('2d', { willReadFrequently: true });
const wrap      = document.getElementById('cam-wrap');
const statusBar = document.getElementById('status-bar');

// Cache all DOM elements accessed per-frame
const $lrVal   = document.getElementById('lr-val');
const $tbVal   = document.getElementById('tb-val');
const $lrRatio = document.getElementById('lr-ratio');
const $tbRatio = document.getElementById('tb-ratio');
const $lrBar   = document.getElementById('lr-bar');
const $tbBar   = document.getElementById('tb-bar');
const $grade   = document.getElementById('grade-val');
const $gDesc   = document.getElementById('grade-desc');
const $autoBtn = document.getElementById('auto-btn');
const $lockBtn = document.getElementById('lock-btn');
const $startMsg = document.getElementById('start-msg');

let locked = false, lockedCard = null, smoothCard = null, lastDetect = 0;
const SMOOTH = 0.15;
const PW = 160, PH = 120;
const PIXELS = PW * PH;
const THRESH = 55;
const ROW_T = 0.25, COL_T = 0.25;

// Grade lookup: [maxRatio, label, color, description]
const GRADES = [
  [1.22, '10', '#00ff88', 'PSA 10 territory \u{1F525}'],
  [1.50, '9',  '#aaff00', 'Strong PSA 9'],
  [1.86, '8',  '#ffcc00', 'Likely PSA 8'],
  [2.33, '7',  '#ff8800', 'PSA 7 range'],
  [Infinity, '6\u2193', '#ff2244', 'Off-center']
];

proc.width = PW; proc.height = PH;

// Pre-allocate buffers reused every detection frame
const gray = new Uint8Array(PIXELS);
const rowBright = new Float32Array(PH);
const colBright = new Float32Array(PW);

function lerp(a, b, t) { return a + (b - a) * t; }

function ratio(a, b) {
  return Math.min(a, b) > 2 ? Math.max(a, b) / Math.min(a, b) : 99;
}

function pct(a, b) {
  const t = a + b;
  return t ? `${Math.round(a / t * 100)}/${Math.round(b / t * 100)}` : '\u2014';
}

// Returns {lB, rB, tB, bB, lrR, tbR, worst} for a card rect
function computeMargins(card) {
  const W = overlay.width, H = overlay.height;
  const lB = card.x, rB = W - (card.x + card.w);
  const tB = card.y, bB = H - (card.y + card.h);
  const lrR = ratio(lB, rB);
  const tbR = ratio(tB, bB);
  return { lB, rB, tB, bB, lrR, tbR, worst: Math.max(lrR, tbR) };
}

// --- Camera start ---
document.getElementById('start-btn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } }
    });
    video.srcObject = stream;
    $startMsg.style.display = 'none';
    resizeCanvas();
    requestAnimationFrame(loop);
  } catch(e) {
    $startMsg.innerHTML =
      `<h2 style="color:var(--red)">Camera Error</h2>
       <p>${e.message}</p>
       <p style="margin-top:10px;color:#555;font-size:0.65rem">Open this page directly in Safari, not inside another app.</p>`;
  }
});

$autoBtn.addEventListener('click', () => {
  locked = false; lockedCard = null;
  $autoBtn.classList.add('active');
  $lockBtn.classList.remove('locked');
  $lockBtn.textContent = '\u2B1B LOCK';
});

$lockBtn.addEventListener('click', () => {
  if (smoothCard) {
    locked = true; lockedCard = { ...smoothCard };
    $lockBtn.classList.add('locked');
    $lockBtn.textContent = '\u2713 LOCKED';
  }
});

function resizeCanvas() {
  overlay.width  = wrap.clientWidth;
  overlay.height = wrap.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- Main loop ---
let frameCount = 0;
function loop() {
  requestAnimationFrame(loop);
  if (!locked && video.readyState === 4 && ++frameCount % 5 === 0) detectCard();
  const card = locked ? lockedCard : smoothCard;
  drawOverlay(card);
  if (card) updateStats(card);
}

// --- Card detection (reuses pre-allocated buffers) ---
function detectCard() {
  try { pctx.drawImage(video, 0, 0, PW, PH); }
  catch(e) { return; }

  const data = pctx.getImageData(0, 0, PW, PH).data;

  // Grayscale conversion + row/col projection in a single pass
  rowBright.fill(0);
  colBright.fill(0);

  for (let y = 0; y < PH; y++) {
    const rowOff = y * PW;
    let rowCnt = 0;
    for (let x = 0; x < PW; x++) {
      const i = (rowOff + x) * 4;
      const g = (data[i] * 77 + data[i + 1] * 150 + data[i + 2] * 29) >> 8;
      if (g > THRESH) {
        rowCnt++;
        colBright[x]++;
      }
    }
    rowBright[y] = rowCnt / PW;
  }

  // Normalize column counts
  for (let x = 0; x < PW; x++) colBright[x] /= PH;

  // Find edges
  let top = -1, bot = -1, left = -1, right = -1;

  for (let y = 0; y < PH; y++) {
    if (rowBright[y] > ROW_T) { if (top < 0) top = y; bot = y; }
  }
  for (let x = 0; x < PW; x++) {
    if (colBright[x] > COL_T) { if (left < 0) left = x; right = x; }
  }

  if (top < 0 || left < 0) {
    if (Date.now() - lastDetect > 1200) {
      smoothCard = null;
      statusBar.textContent = 'Searching \u2014 place card on dark surface';
    }
    return;
  }

  const cw = right - left;
  const ch = bot - top;
  if (cw < PW * 0.1 || ch < PH * 0.1) return;

  const ar = cw / ch;
  if (ar < 0.45 || ar > 1.1) return;

  const sx = overlay.width / PW;
  const sy = overlay.height / PH;
  const nx = left * sx, ny = top * sy, nw = cw * sx, nh = ch * sy;

  if (!smoothCard) {
    smoothCard = { x: nx, y: ny, w: nw, h: nh };
  } else {
    smoothCard.x = lerp(smoothCard.x, nx, SMOOTH);
    smoothCard.y = lerp(smoothCard.y, ny, SMOOTH);
    smoothCard.w = lerp(smoothCard.w, nw, SMOOTH);
    smoothCard.h = lerp(smoothCard.h, nh, SMOOTH);
  }
  lastDetect = Date.now();
  statusBar.textContent = `Card detected \u00b7 AR ${ar.toFixed(2)}`;
}

// --- Draws a line from (x1,y1) to (x2,y2) on the current path ---
function line(x1, y1, x2, y2) {
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
}

// --- Draw overlay ---
function drawOverlay(card) {
  const W = overlay.width, H = overlay.height;
  ctx.clearRect(0, 0, W, H);

  if (!card) {
    const scanY = ((Date.now() / 1500) % 1) * H;
    ctx.strokeStyle = 'rgba(255,204,0,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath(); line(0, scanY, W, scanY); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,204,0,0.18)';
    ctx.setLineDash([6, 6]); ctx.lineWidth = 1.5;
    ctx.strokeRect(W * 0.08, H * 0.04, W * 0.84, H * 0.88);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,204,0,0.5)';
    ctx.font = '11px "Share Tech Mono"'; ctx.textAlign = 'center';
    ctx.fillText('Position card in frame', W / 2, H / 2);
    return;
  }

  const { x, y, w: cw, h: ch } = card;
  const xr = x + cw, yb = y + ch;

  // Dim outside card
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, y);
  ctx.fillRect(0, yb, W, H - yb);
  ctx.fillRect(0, y, x, ch);
  ctx.fillRect(xr, y, W - xr, ch);

  // Grade colour
  const { worst } = computeMargins(card);
  const bc = worst <= 1.22 ? '#00ff88' : worst <= 1.5 ? '#aaff00' : worst <= 1.86 ? '#ffcc00' : '#ff6600';

  // Glow border
  ctx.strokeStyle = bc; ctx.lineWidth = 2.5;
  ctx.shadowColor = bc; ctx.shadowBlur = 12;
  ctx.strokeRect(x, y, cw, ch); ctx.shadowBlur = 0;

  // Corner brackets (single batched path)
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
  ctx.beginPath();
  line(x, y, x + 22, y); line(x, y, x, y + 22);
  line(xr, y, xr - 22, y); line(xr, y, xr, y + 22);
  line(x, yb, x + 22, yb); line(x, yb, x, yb - 22);
  line(xr, yb, xr - 22, yb); line(xr, yb, xr, yb - 22);
  ctx.stroke();

  // Crosshair (single batched path)
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.setLineDash([4, 5]); ctx.lineWidth = 1;
  ctx.beginPath();
  line(x + cw / 2, y, x + cw / 2, yb);
  line(x, y + ch / 2, xr, y + ch / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Edge lines - cyan horizontal (single path)
  ctx.strokeStyle = '#00cfff'; ctx.lineWidth = 1.5; ctx.shadowColor = '#00cfff'; ctx.shadowBlur = 5;
  ctx.beginPath();
  line(0, y, W, y);
  line(0, yb, W, yb);
  ctx.stroke();

  // Edge lines - orange vertical (single path)
  ctx.strokeStyle = '#ff6600'; ctx.shadowColor = '#ff6600';
  ctx.beginPath();
  line(x, 0, x, H);
  line(xr, 0, xr, H);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Frame center reference (single path)
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.setLineDash([3, 8]); ctx.lineWidth = 1;
  ctx.beginPath();
  line(W / 2, 0, W / 2, H);
  line(0, H / 2, W, H / 2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function updateStats(card) {
  const { lB, rB, tB, bB, lrR, tbR, worst } = computeMargins(card);

  $lrVal.textContent   = pct(lB, rB);
  $tbVal.textContent   = pct(tB, bB);
  $lrRatio.textContent = lrR.toFixed(2) + ':1';
  $tbRatio.textContent = tbR.toFixed(2) + ':1';
  $lrBar.style.width   = ((card.x + card.w / 2) / overlay.width * 100) + '%';
  $tbBar.style.width   = ((card.y + card.h / 2) / overlay.height * 100) + '%';

  for (const [threshold, label, color, desc] of GRADES) {
    if (worst <= threshold) {
      $grade.textContent = label;
      $grade.style.color = color;
      $gDesc.textContent = desc;
      break;
    }
  }
}
</script></body>
</html>
